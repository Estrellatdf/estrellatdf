<!doctype html>
<html lang="es" class="notranslate" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.json" />
    <title>U.E. 19 de Agosto</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <style>
      #onesignal-bell-container { z-index: 999999 !important; }
    </style>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "2a9779af-a413-47f6-9196-9be1bf792bbe",
          serviceWorkerPath: 'sw.js',
          allowLocalhostAsSecureOrigin: true,
          notifyButton: {
            enable: true,
            position: 'bottom-right',
            size: 'medium',
            theme: 'default',
            displayPredicate: function() { return true; },
            text: {
              'tip.state.unsubscribed': 'Suscribirse a notificaciones',
              'tip.state.subscribed': 'Estás suscrito a las notificaciones',
              'tip.state.blocked': 'Has bloqueado las notificaciones',
              'message.prenotify': 'Haz clic para suscribirte a las notificaciones',
              'message.action.subscribed': '¡Gracias por suscribirte!',
              'message.action.resubscribed': 'Estás suscrito a las notificaciones',
              'message.action.unsubscribed': 'Ya no recibirás notificaciones',
              'dialog.main.title': 'Gestionar Notificaciones',
              'dialog.main.button.subscribe': 'SUSCRIBIRSE',
              'dialog.main.button.unsubscribe': 'ANULAR SUSCRIPCIÓN'
            }
          },
          promptOptions: {
            slidedown: {
              prompts: [
                {
                  type: "push",
                  autoPrompt: true,
                  text: {
                    actionMessage: "¿Deseas recibir notificaciones sobre notas y comunicados en tiempo real?",
                    acceptButton: "Suscibirme",
                    cancelButton: "Más tarde"
                  },
                  delay: {
                    pageViews: 1,
                    timeDelay: 5
                  }
                }
              ]
            }
          }
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
